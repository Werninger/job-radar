<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Radar · ETH CS</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #020817;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    a { color: inherit; text-decoration: none; }

    /* Header */
    .header {
      border-bottom: 1px solid #1e293b;
      padding: 20px 24px 16px;
    }
    .header-inner {
      max-width: 820px;
      margin: 0 auto;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
    }
    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #f1f5f9;
    }
    .badge {
      font-size: 11px;
      color: #38bdf8;
      background: #38bdf810;
      border: 1px solid #38bdf830;
      border-radius: 4px;
      padding: 2px 8px;
      font-weight: 600;
    }
    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: #475569;
    }
    .refresh-btn {
      background: #38bdf8;
      color: #020817;
      border: none;
      border-radius: 7px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      transition: opacity 0.2s;
    }
    .refresh-btn:hover { opacity: 0.85; }
    .refresh-btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

    /* Stats */
    .stats {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 7px;
      padding: 8px 14px;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
    }
    .stat-label {
      font-size: 11px;
      color: #475569;
      margin-top: 1px;
    }

    /* Tabs */
    .tabs {
      max-width: 820px;
      margin: 0 auto;
      padding: 14px 24px 0;
    }
    .tab-row {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      background: transparent;
      color: #475569;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: #1e293b;
      color: #f1f5f9;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 12px; color: #64748b; }
    .filter-btn {
      padding: 4px 11px;
      border-radius: 5px;
      border: 1px solid #1e293b;
      background: transparent;
      color: #475569;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }
    .filter-btn.active {
      border-color: #38bdf8;
      background: #38bdf810;
      color: #38bdf8;
    }
    .count-label {
      margin-left: auto;
      font-size: 12px;
      color: #475569;
    }

    /* Job card */
    .job-card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 16px 18px;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 10px;
    }
    .job-card:hover { border-color: #334155; }
    .job-card.expanded { border-color: var(--score-color, #334155); }
    .job-card { border-left: 3px solid var(--score-color, #334155); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .card-left { flex: 1; min-width: 0; }
    .card-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .job-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: #f1f5f9;
    }
    .score-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      border-radius: 4px;
      padding: 2px 7px;
      text-transform: uppercase;
      border: 1px solid;
    }
    .card-meta {
      margin-top: 4px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .company-name { color: #94a3b8; font-size: 13px; font-weight: 600; }
    .meta-dot { color: #475569; font-size: 12px; }
    .meta-item { color: #64748b; font-size: 12px; }
    .tags-row {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 11px;
      color: #64748b;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 1px 6px;
    }
    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .stars { display: flex; gap: 2px; }
    .star { font-size: 14px; }
    .star.on { color: #f59e0b; }
    .star.off { color: #334155; }
    .posted-label { font-size: 11px; color: #475569; }
    .source-label { font-size: 11px; color: #334155; }

    /* Expanded section */
    .card-expanded {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #1e293b;
    }
    .expand-section { margin-bottom: 10px; }
    .expand-heading {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .expand-text {
      margin-top: 5px;
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .mismatch-list { margin-top: 5px; padding-left: 16px; }
    .mismatch-item { font-size: 13px; color: #ef4444; line-height: 1.6; }
    .view-link {
      display: inline-block;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 600;
      color: #38bdf8;
      border: 1px solid #38bdf844;
      border-radius: 5px;
      padding: 4px 12px;
      background: #38bdf80d;
      transition: background 0.15s;
    }
    .view-link:hover { background: #38bdf820; }

    /* Sources tab */
    .sources-intro { font-size: 13px; color: #64748b; margin-bottom: 16px; }
    .source-category { margin-bottom: 20px; }
    .source-cat-label {
      font-size: 11px;
      font-weight: 700;
      color: #475569;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .source-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .source-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      border-radius: 5px;
      padding: 3px 9px;
      border: 1px solid;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .source-chip:hover { opacity: 0.75; }
    .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* Empty/loading */
    .loading-msg {
      text-align: center;
      color: #475569;
      padding: 40px 0;
      font-size: 14px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="title-row">
          <span class="title">Job Radar</span>
          <span class="badge">ETH CS · AI/ML</span>
        </div>
        <div class="subtitle" id="last-updated">Loading...</div>
      </div>
      <button class="refresh-btn" onclick="loadJobs()">↻ Refresh</button>
    </div>
    <div class="stats" id="stats-row"></div>
  </div>
</div>

<div class="tabs">
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('jobs', this)">📋 Listings</button>
    <button class="tab-btn" onclick="switchTab('sites', this)">🔗 Sources</button>
  </div>

  <!-- Jobs tab -->
  <div class="tab-panel active" id="tab-jobs">
    <div class="filter-bar">
      <span class="filter-label">Min score:</span>
      <button class="filter-btn active" onclick="setFilter(0, this)">All</button>
      <button class="filter-btn" onclick="setFilter(3, this)">★★★</button>
      <button class="filter-btn" onclick="setFilter(4, this)">★★★★</button>
      <button class="filter-btn" onclick="setFilter(5, this)">★★★★★</button>
      <span class="count-label" id="count-label"></span>
    </div>
    <div id="jobs-list"><div class="loading-msg">Loading jobs...</div></div>
  </div>

  <!-- Sites tab -->
  <div class="tab-panel" id="tab-sites">
    <p class="sources-intro">These sources are monitored twice daily (9am and 6pm Zurich time).</p>
    <div id="sites-list"></div>
  </div>
</div>

<script>
const JOB_SITES = [
  { name: "LinkedIn Jobs", url: "https://www.linkedin.com/jobs/search/?keywords=machine+learning+engineer&location=Zurich", category: "General" },
  { name: "ETH Career Center", url: "https://eth-gethired.ch", category: "University" },
  { name: "Wellfound", url: "https://wellfound.com/jobs?role=ml-engineer&location=zurich", category: "Startups" },
  { name: "Google Careers", url: "https://careers.google.com/jobs/results/?q=machine+learning&location=Zurich", category: "Big Tech" },
  { name: "DeepMind Careers", url: "https://deepmind.google/about/careers/", category: "AI Research" },
  { name: "Mistral AI", url: "https://mistral.ai/company/careers/", category: "AI Research" },
  { name: "OpenAI Careers", url: "https://openai.com/careers", category: "AI Research" },
  { name: "Anthropic Careers", url: "https://www.anthropic.com/careers", category: "AI Research" },
  { name: "Indeed Switzerland", url: "https://ch.indeed.com/jobs?q=machine+learning+engineer&l=Z%C3%BCrich", category: "General" },
  { name: "Jobs.ch", url: "https://www.jobs.ch/en/vacancies/?term=machine+learning", category: "Switzerland" },
];

const CAT_COLORS = {
  General: "#6366f1", University: "#22c55e", Startups: "#f59e0b",
  "Big Tech": "#3b82f6", "AI Research": "#a855f7", Switzerland: "#ef4444",
};

let allJobs = [];
let currentFilter = 0;
let expandedId = null;

async function loadJobs() {
  document.querySelector('.refresh-btn').disabled = true;
  document.querySelector('.refresh-btn').textContent = "Loading...";
  try {
    const res = await fetch(`jobs.json?t=${Date.now()}`);
    const data = await res.json();
    allJobs = data.jobs || [];
    const d = new Date(data.lastUpdated);
    document.getElementById('last-updated').textContent =
      `Last updated: ${d.toLocaleDateString('en-CH', {day:'2-digit',month:'short'})} at ${d.toLocaleTimeString('en-CH',{hour:'2-digit',minute:'2-digit'})} · Checks at 9am & 6pm Zurich`;
    renderStats(data);
    renderJobs();
  } catch(e) {
    document.getElementById('jobs-list').innerHTML = '<div class="loading-msg">Could not load jobs. The scraper may not have run yet.</div>';
  }
  document.querySelector('.refresh-btn').disabled = false;
  document.querySelector('.refresh-btn').textContent = "↻ Refresh";
}

function renderStats(data) {
  const perfect = allJobs.filter(j => j.score === 5).length;
  const strong = allJobs.filter(j => j.score === 4).length;
  document.getElementById('stats-row').innerHTML = [
    { label: "Total found", value: allJobs.length, color: "#f1f5f9" },
    { label: "Perfect match", value: perfect, color: "#22c55e" },
    { label: "Strong match", value: strong, color: "#3b82f6" },
    { label: "Sites monitored", value: data.totalSites || JOB_SITES.length, color: "#f1f5f9" },
  ].map(s => `
    <div class="stat-card">
      <div class="stat-value" style="color:${s.color}">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>
  `).join('');
}

function renderJobs() {
  const filtered = allJobs.filter(j => j.score >= currentFilter).sort((a,b) => b.score - a.score);
  document.getElementById('count-label').textContent = `${filtered.length} listings`;
  if (!filtered.length) {
    document.getElementById('jobs-list').innerHTML = '<div class="loading-msg">No jobs match this filter.</div>';
    return;
  }
  document.getElementById('jobs-list').innerHTML = filtered.map(job => renderCard(job)).join('');
}

function renderCard(job) {
  const stars = [1,2,3,4,5].map(s =>
    `<span class="star ${s <= job.score ? 'on' : 'off'}">★</span>`
  ).join('');
  const tags = (job.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
  const mismatches = (job.mismatches||[]).length > 0
    ? `<div class="expand-section">
        <div class="expand-heading">Mismatches</div>
        <ul class="mismatch-list">${job.mismatches.map(m=>`<li class="mismatch-item">${m}</li>`).join('')}</ul>
       </div>` : '';

  const isExpanded = expandedId === job.id;
  const expandedHtml = isExpanded ? `
    <div class="card-expanded">
      <div class="expand-section">
        <div class="expand-heading">Why included</div>
        <p class="expand-text">${job.reasoning}</p>
      </div>
      ${mismatches}
      <a class="view-link" href="${job.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View Listing →</a>
    </div>` : '';

  return `
    <div class="job-card ${isExpanded ? 'expanded' : ''}"
         style="--score-color: ${job.scoreColor}"
         onclick="toggleCard(${job.id})">
      <div class="card-top">
        <div class="card-left">
          <div class="card-title-row">
            <span class="job-title">${job.title}</span>
            <span class="score-badge" style="color:${job.scoreColor};background:${job.scoreColor}18;border-color:${job.scoreColor}44">
              ${job.scoreLabel}
            </span>
          </div>
          <div class="card-meta">
            <span class="company-name">${job.company}</span>
            <span class="meta-dot">·</span>
            <span class="meta-item">📍 ${job.location}</span>
            <span class="meta-dot">·</span>
            <span class="meta-item">💰 ${job.salary}</span>
          </div>
          <div class="tags-row">${tags}</div>
        </div>
        <div class="card-right">
          <div class="stars">${stars}</div>
          <span class="posted-label">${job.posted}</span>
          <span class="source-label">${job.source}</span>
        </div>
      </div>
      ${expandedHtml}
    </div>`;
}

function toggleCard(id) {
  expandedId = expandedId === id ? null : id;
  renderJobs();
}

function setFilter(score, btn) {
  currentFilter = score;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderJobs();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

function renderSites() {
  const cats = [...new Set(JOB_SITES.map(s => s.category))];
  document.getElementById('sites-list').innerHTML = cats.map(cat => {
    const sites = JOB_SITES.filter(s => s.category === cat);
    const color = CAT_COLORS[cat] || '#64748b';
    const chips = sites.map(s => `
      <a class="source-chip" href="${s.url}" target="_blank" rel="noopener"
         style="color:${color};background:${color}12;border-color:${color}33">
        <span class="chip-dot" style="background:${color}"></span>
        ${s.name}
      </a>`).join('');
    return `
      <div class="source-category">
        <div class="source-cat-label">${cat}</div>
        <div class="source-chips">${chips}</div>
      </div>`;
  }).join('');
}

renderSites();
loadJobs();
</script>
</body>
</html>
